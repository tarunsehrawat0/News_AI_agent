<svg xmlns="http://www.w3.org/2000/svg" width="440" height="920" viewBox="0 0 440 920">
  <defs>
    <style>
      .bg { fill: #000000; }
      .box { fill: #071b2d; stroke: #2e6f93; stroke-width: 2; rx: 4; ry: 4; }
      .diamond { fill: #071b2d; stroke: #2e6f93; stroke-width: 2; }
      .text { fill: #f2f8ff; font-family: Arial, Helvetica, sans-serif; font-size: 14px; text-anchor: middle; }
      .small { font-size: 12px; }
      .label { fill: #d9ecff; font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 700; }
      .line { stroke: #d9ecff; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#d9ecff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="440" height="920" />

  <!-- Start -->
  <rect class="box" x="187" y="20" width="66" height="28" />
  <text class="text small" x="220" y="39">Start</text>
  <path class="line" d="M220 48 L220 66" marker-end="url(#arrow)" />

  <!-- Decision -->
  <polygon class="diamond" points="220,72 266,112 220,152 174,112" />
  <text class="text small" x="220" y="108">How is it run?</text>

  <path class="line" d="M174 112 L124 112" marker-end="url(#arrow)" />
  <path class="line" d="M266 112 L316 112" marker-end="url(#arrow)" />
  <text class="label" x="82" y="107">Manual run</text>
  <text class="label" x="314" y="107">Daily schedule</text>

  <!-- app.py -->
  <rect class="box" x="60" y="132" width="128" height="34" />
  <text class="text" x="124" y="153">app.py</text>
  <path class="line" d="M124 166 L124 200" marker-end="url(#arrow)" />

  <!-- scheduler.py -->
  <rect class="box" x="252" y="132" width="128" height="48" />
  <text class="text small" x="316" y="150">scheduler.py</text>
  <text class="text small" x="316" y="166">SEND_TIME = 07:30</text>
  <path class="line" d="M316 180 L316 200" marker-end="url(#arrow)" />

  <!-- LangGraph workflow -->
  <rect class="box" x="136" y="208" width="168" height="34" />
  <text class="text small" x="220" y="229">LangGraph workflow</text>
  <path class="line" d="M220 242 L220 270" marker-end="url(#arrow)" />

  <rect class="box" x="122" y="278" width="196" height="34" />
  <text class="text small" x="220" y="299">Fetch News Node</text>
  <path class="line" d="M220 312 L220 340" marker-end="url(#arrow)" />

  <rect class="box" x="124" y="348" width="192" height="44" />
  <text class="text small" x="220" y="366">NewsAPI</text>
  <text class="text small" x="220" y="381">Fetch latest 5 articles</text>
  <path class="line" d="M220 392 L220 420" marker-end="url(#arrow)" />

  <rect class="box" x="136" y="428" width="168" height="34" />
  <text class="text small" x="220" y="449">Summarize News Node</text>
  <path class="line" d="M220 462 L220 490" marker-end="url(#arrow)" />

  <rect class="box" x="120" y="498" width="200" height="46" />
  <text class="text small" x="220" y="516">OpenAI GPT-5 / GPT-4.1</text>
  <text class="text small" x="220" y="532">Summarize each article</text>
  <path class="line" d="M220 544 L220 572" marker-end="url(#arrow)" />

  <rect class="box" x="136" y="580" width="168" height="34" />
  <text class="text small" x="220" y="601">Create Email Node</text>
  <path class="line" d="M220 614 L220 642" marker-end="url(#arrow)" />

  <rect class="box" x="118" y="650" width="204" height="44" />
  <text class="text small" x="220" y="668">Build email body</text>
  <text class="text small" x="220" y="684">Date + title + summary + link</text>
  <path class="line" d="M220 694 L220 722" marker-end="url(#arrow)" />

  <rect class="box" x="138" y="730" width="164" height="34" />
  <text class="text small" x="220" y="751">Send Email Node</text>
  <path class="line" d="M220 764 L220 792" marker-end="url(#arrow)" />

  <rect class="box" x="155" y="800" width="130" height="34" />
  <text class="text small" x="220" y="821">Gmail SMTP</text>
  <path class="line" d="M220 834 L220 862" marker-end="url(#arrow)" />

  <rect class="box" x="154" y="870" width="132" height="34" />
  <text class="text small" x="220" y="891">Send to TO_EMAIL</text>
</svg>